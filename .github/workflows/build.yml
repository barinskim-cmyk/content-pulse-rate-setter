# Сборка Content Pulse Rate Setter: macOS .app + Windows .exe.
# Релиз-тег latest обновляется при каждом запуске.
# Запуск: push в main или вручную (gh workflow run build.yml)
name: Build Rate Setter

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  mac:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - name: Compile Tahoe icon (Assets.car + icns из RateSetter.icon)
        run: |
          mkdir -p iconbuild
          xcrun actool "RateSetter.icon" --app-icon RateSetter \
            --compile iconbuild \
            --output-partial-info-plist iconbuild/partial.plist \
            --minimum-deployment-target 11.0 --platform macosx --target-device mac
          ls -la iconbuild
          # свежий icns из actool заменяет наш ручной (единый источник)
          test -f iconbuild/Assets.car
          if [ -f iconbuild/RateSetter.icns ]; then cp iconbuild/RateSetter.icns icon.icns; fi
      - name: Build .app
        run: |
          pyinstaller --noconfirm "C1 Rate Setter.spec"
          APP="dist/Content Pulse Rate Setter.app"
          # Tahoe-иконка нового формата: Assets.car + CFBundleIconName
          cp iconbuild/Assets.car "$APP/Contents/Resources/"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string RateSetter" "$APP/Contents/Info.plist" \
            || /usr/libexec/PlistBuddy -c "Set :CFBundleIconName RateSetter" "$APP/Contents/Info.plist"
          codesign --force --deep -s - "$APP" || true
          cd dist && ditto -c -k --keepParent "Content Pulse Rate Setter.app" "Content-Pulse-Rate-Setter-macOS.zip"
      - name: Smoke check
        run: |
          test -d "dist/Content Pulse Rate Setter.app/Contents/MacOS"
          test -f "dist/Content Pulse Rate Setter.app/Contents/Resources/Assets.car"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "dist/Content Pulse Rate Setter.app/Contents/Info.plist"
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: dist/Content-Pulse-Rate-Setter-macOS.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - name: Build .exe
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --windowed --icon icon.ico --name "Content Pulse Rate Setter" C1_RateSetter.py
          Move-Item "dist/Content Pulse Rate Setter.exe" "dist/Content-Pulse-Rate-Setter-Windows.exe"
      - name: Smoke check
        shell: pwsh
        run: if (!(Test-Path "dist/Content-Pulse-Rate-Setter-Windows.exe")) { exit 1 }
      - uses: actions/upload-artifact@v4
        with:
          name: win
          path: dist/Content-Pulse-Rate-Setter-Windows.exe

  release:
    needs: [mac, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: art
          merge-multiple: true
      - run: cp instruction.html art/instruction.html && ls art
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Content Pulse Rate Setter"
          body: |
            Rate Setter — ставит рейтинг 5* и ключевое слово SELECTED
            в сессию Capture One по списку отобранных кадров.
            - Content-Pulse-Rate-Setter-macOS.zip — для Mac (распаковать, при первом запуске: правый клик → Открыть)
            - Content-Pulse-Rate-Setter-Windows.exe — для Windows
            - instruction.html — инструкция
          files: |
            art/Content-Pulse-Rate-Setter-macOS.zip
            art/Content-Pulse-Rate-Setter-Windows.exe
            art/instruction.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
